<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f4f8;
            font-family: Arial, sans-serif;
            padding: 30px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background-color: hsl(33, 82%, 54%);
            padding: 20px;
            border-radius: 10px;
        }

        .title {
            text-align: center;
            font-size: 40px;
            color: #a0144e;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="title">Heat Calculator</div>

    <label>Degree in Celsius</label>
    <input type="text" id="Degree" class="form-control" placeholder="Input degree value">

    <br>

    <label>Humidity in %</label>
    <input type="text" id="Humidity" class="form-control" placeholder="Input percentage value">

    <br>

    <button onclick="Calculator()" class="btn btn-info w-100">Calculate</button>
</div>

<script>
function Calculator() {
    var temp = parseFloat(document.getElementById("Degree").value);
    var humidity = parseFloat(document.getElementById("Humidity").value);

    if (isNaN(temp) || isNaN(humidity)) {
        alert("Please enter valid numbers.");
        return;
    }
    var heatIndex = temp + (0.33 * humidity) - 4;
    let result = "";

    if (heatIndex <= 27) {
        result = "Comfortable / Cool";
    } 
    else if (heatIndex <= 32) {
        result = "Warm";
    } 
    else if (heatIndex <= 37) {
        result = "Hot";
    } 
    else if (heatIndex <= 41) {
        result = "Very Hot / Caution";
    } 
    else {
        result = "Do NOT go outside";
    }

    alert(
        "Heat Index: " + heatIndex.toFixed(2) + "°C\n" +
        "Status: " + result
    );
}
</script>

</body>
</html>
